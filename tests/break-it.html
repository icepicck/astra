<h1>ASTRA — BREAK IT</h1>
<div class="subtitle">ADVERSARIAL TEST SUITE &bull; STEPS 5&ndash;7</div>

<button class="run-btn" id="run-btn" onclick="runAll()">TRY TO BREAK IT</button>

<a href="/index.html" class="back-link">BACK TO ASTRA</a>

<script>
// ═══════════════════════════════════════════
// ASTRA ADVERSARIAL TEST SUITE — Steps 5–7
// Prefix: BREAK- for all test data (cleaned up at end)
// ═══════════════════════════════════════════

var _tests = [];
var _passed = 0;
var _failed = 0;
var _skipped = 0;
var _currentSuite = '';
var _A = null;
var PREFIX = 'BREAK-';

// ── Test Framework ──

function suite(name) { _currentSuite = name; }

function addResult(name, status, notes) {
  if (status === true) status = 'pass';
  else if (status === false) status = 'fail';
  _tests.push({ suite: _currentSuite, name: name, status: status, notes: notes || '' });
  if (status === 'pass') _passed++;
  else if (status === 'fail') _failed++;
  else if (status === 'skip') _skipped++;
  renderResults();
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function renderResults() {
  var html = '';
  var currentSuite = '';
  _tests.forEach(function(t) {
    if (t.suite !== currentSuite) {
      currentSuite = t.suite;
      html += '<div class="suite"><div class="suite-title">' + currentSuite + '</div>';
    }
    var cls = 'test-' + (t.status === 'skip' ? 'skip' : t.status);
    var icon = t.status === 'pass' ? 'O' : t.status === 'fail' ? 'X' : t.status === 'running' ? '...' : '-';
    var iconColor = t.status === 'pass' ? '#2d8a4e' : t.status === 'fail' ? '#c0392b' : t.status === 'running' ? '#FF6B00' : '#666';
    html += '<div class="test-row ' + cls + '">';
    html += '<span class="test-icon" style="color:' + iconColor + ';">' + icon + '</span>';
    html += '<span class="test-name">' + t.name;
    if (t.notes) html += '<br><span class="test-notes">' + t.notes + '</span>';
    html += '</span></div>';
  });
  document.getElementById('results').innerHTML = html;

  var total = _passed + _failed + _skipped;
  if (total > 0) {
    var summaryHtml = '<div class="summary">' +
      '<div class="summary-row"><span class="summary-label">PASSED</span><span class="summary-value summary-pass">' + _passed + '</span></div>' +
      '<div class="summary-row"><span class="summary-label">FAILED</span><span class="summary-value summary-fail">' + _failed + '</span></div>' +
      '<div class="summary-row"><span class="summary-label">SKIPPED</span><span class="summary-value" style="color:#666;">' + _skipped + '</span></div>' +
      '<div class="summary-row"><span class="summary-label">TOTAL</span><span class="summary-value summary-total">' + total + '</span></div>';
    var failList = _tests.filter(function(t) { return t.status === 'fail'; });
    if (failList.length > 0) {
      summaryHtml += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid #333;">';
      summaryHtml += '<div style="font-size:11px;font-weight:800;color:#c0392b;letter-spacing:1px;margin-bottom:8px;">FAILURES:</div>';
      failList.forEach(function(t) {
        summaryHtml += '<div style="font-size:13px;color:#e0e0e0;margin-bottom:4px;">' + t.suite + ' &gt; ' + t.name;
        if (t.notes) summaryHtml += '<br><span style="font-size:11px;color:#888;">' + t.notes + '</span>';
        summaryHtml += '</div>';
      });
      summaryHtml += '</div>';
    }
    summaryHtml += '</div>';
    document.getElementById('summary').innerHTML = summaryHtml;
  }
}

// ── Load ASTRA ──

function loadAstra() {
  return new Promise(function(resolve, reject) {
    // Ensure debug mode for test APIs
    localStorage.setItem('astra_debug', 'true');

    // Stub auth module — FAT-029 boot validation checks window.doLogin
    if (!window.doLogin) window.doLogin = function() {};
    if (!window.logout) window.logout = function() {};
    // Stub checkAuth to skip auth gate
    window._breakitAuthStubbed = true;

    // Minimal DOM shell
    var shell = document.createElement('div');
    shell.id = 'astra-test-shell';
    shell.style.display = 'none';
    shell.innerHTML = '<div id="toast-container"></div><div id="global-nav"><span id="sync-indicator" class="sync-indicator sync-hidden"></span><span id="notif-badge" style="display:none"></span></div>' +
      '<div id="nav-shortcuts"></div><div id="screen-jobs" class="screen active"><div class="screen-body"><div id="jobs-body"></div></div></div>' +
      '<div id="screen-settings" class="screen"></div><div id="screen-search" class="screen"></div>' +
      '<div id="screen-detail" class="screen"></div><div id="screen-create" class="screen"></div>' +
      '<div id="screen-addresses" class="screen"></div><div id="screen-archive" class="screen"></div>' +
      '<div id="screen-dashboard" class="screen"></div><div id="screen-materials" class="screen"></div>' +
      '<div id="screen-vector" class="screen"></div><div id="screen-estimate-builder" class="screen"><div class="screen-body" id="estimate-builder-body"></div></div>' +
      '<div id="screen-estimates" class="screen"><div class="screen-body" id="estimates-body"></div></div>' +
      '<div id="screen-pricebook" class="screen"><div class="screen-body" id="pricebook-body"></div></div>' +
      '<div id="screen-notifications" class="screen"></div>' +
      '<div id="sidebar"></div><div id="sidebar-backdrop"></div>' +
      '<div id="home-toggle"></div><div id="settings-stats"></div><div id="storage-info"></div>' +
      '<input type="file" id="photo-input" style="display:none">' +
      '<input type="file" id="drawing-input" style="display:none">' +
      '<input type="file" id="video-input" style="display:none">' +
      '<div id="overlay" class="overlay"></div><div class="status-picker" id="status-picker"></div>' +
      '<div id="sync-status" style="display:none"></div>' +
      '<input type="file" id="import-input" style="display:none">' +
      '<div id="search-results"></div>';
    document.body.appendChild(shell);

    var scripts = ['/app.js', '/astra-materials.js', '/astra-maps.js', '/astra-sync.js', '/astra-estimates.js'];
    var loaded = 0;

    function loadNext() {
      if (loaded >= scripts.length) {
        var checks = 0;
        var waitForInit = setInterval(function() {
          checks++;
          if (window.Astra && window.Astra.loadJobs) {
            clearInterval(waitForInit);
            _A = window.Astra;
            // Disable auto-sync to prevent IDB contention during tests
            _A.isSyncConfigured = function() { return false; };
            resolve();
          } else if (checks > 20) {
            clearInterval(waitForInit);
            reject(new Error('ASTRA failed to init after 10s'));
          }
        }, 500);
        return;
      }
      var s = document.createElement('script');
      s.src = scripts[loaded];
      s.onload = function() { loaded++; loadNext(); };
      s.onerror = function() { reject(new Error('Failed to load ' + scripts[loaded])); };
      document.head.appendChild(s);
    }
    loadNext();
  });
}

// ── Helpers ──

function uid() { return crypto.randomUUID(); }
function now() { return new Date().toISOString(); }
function today() { return new Date().toISOString().split('T')[0]; }
function _clearNotifs() { (window.clearNotifications || _A.clearNotifications || function(){})(); }
function _deleteNotif(id) {
  if (typeof window.deleteNotification === 'function') { window.deleteNotification(id); return; }
  // Manual fallback — splice from in-memory cache
  var notifs = _A.loadNotifications();
  for (var i = notifs.length - 1; i >= 0; i--) { if (notifs[i].id === id) { notifs.splice(i, 1); break; } }
  _A.updateNotifBadge();
}

function makeJob(overrides) {
  var base = {
    id: uid(), syncId: uid(),
    address: PREFIX + 'ADV-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
    addressId: '', types: ['Service Call'], status: 'Not Started',
    date: today(), techId: '', techName: '', notes: '', techNotes: '',
    materials: [], photos: [], drawings: [], videos: [],
    manually_added_to_vector: false, archived: false,
    createdAt: now(), updatedAt: now()
  };
  return Object.assign(base, overrides || {});
}

// ══════════════════════════════════════════
// 1. RBAC & STATUS TRANSITIONS
// ══════════════════════════════════════════

async function testRBAC() {
  suite('1. RBAC & STATUS TRANSITIONS');
  var STATUSES = ['Not Started','In Progress','Complete','Needs Callback','Waiting on Materials','pending_approval'];

  // Tech from Not Started: no Complete, no pending_approval
  var techNS = getAllowedTransitions('Not Started', 'tech');
  addResult('Tech from Not Started: no Complete', techNS.indexOf('Complete') === -1, 'got: [' + techNS.join(', ') + ']');
  addResult('Tech from Not Started: no pending_approval', techNS.indexOf('pending_approval') === -1);

  // Tech from pending_approval: empty (locked)
  var techPA = getAllowedTransitions('pending_approval', 'tech');
  addResult('Tech from pending_approval: empty (locked)', techPA.length === 0, 'got: [' + techPA.join(', ') + ']');

  // Tech from Complete: empty (locked)
  var techC = getAllowedTransitions('Complete', 'tech');
  addResult('Tech from Complete: empty (locked)', techC.length === 0, 'got: [' + techC.join(', ') + ']');

  // Supervisor from any: all except self
  STATUSES.forEach(function(s) {
    var allowed = getAllowedTransitions(s, 'supervisor');
    addResult('Supervisor from ' + s + ': excludes self', allowed.indexOf(s) === -1 && allowed.length === STATUSES.length - 1);
  });

  // Admin from any: all except self
  STATUSES.forEach(function(s) {
    var allowed = getAllowedTransitions(s, 'admin');
    addResult('Admin from ' + s + ': excludes self', allowed.indexOf(s) === -1 && allowed.length === STATUSES.length - 1);
  });

  // Null role, undefined role, garbage role
  var nullRole = getAllowedTransitions('Not Started', null);
  addResult('Null role: defaults permissive (not crash)', nullRole.length > 0, 'got ' + nullRole.length + ' transitions');

  var undefRole = getAllowedTransitions('Not Started', undefined);
  addResult('Undefined role: defaults permissive', undefRole.length > 0);

  var garbageRole = getAllowedTransitions('Not Started', 'xyzzy_garbage_999');
  addResult('Garbage role: returns empty (not crash)', Array.isArray(garbageRole), 'got: [' + garbageRole.join(', ') + ']');

  // Invalid status string for tech: empty
  var techBad = getAllowedTransitions('BOGUS_STATUS', 'tech');
  addResult('Invalid status + tech: empty', techBad.length === 0);

  // Invalid status for admin: returns all statuses
  var adminBad = getAllowedTransitions('BOGUS_STATUS', 'admin');
  addResult('Invalid status + admin: returns all statuses', adminBad.length === STATUSES.length, 'got ' + adminBad.length);

  // No self-transitions
  STATUSES.forEach(function(s) {
    var allowed = getAllowedTransitions(s, 'admin');
    addResult('No self-transition: ' + s, allowed.indexOf(s) === -1);
  });
}

// ══════════════════════════════════════════
// 2. MATERIAL DEDUP
// ══════════════════════════════════════════

async function testMaterialDedup() {
  suite('2. MATERIAL DEDUP');

  var sharedAddrId = PREFIX + 'dedup-addr-' + uid();
  var sharedDate = today();
  var itemA = 'dedup-item-' + uid();
  var nameMatch = 'BREAK Dedup Wire ' + uid();

  // Create all test jobs upfront — addJob updates in-memory cache synchronously
  // so assertions can run immediately without IDB sleeps
  var j1 = makeJob({ addressId: sharedAddrId, date: sharedDate, materials: [
    { materialId: uid(), itemId: itemA, name: 'Wire 12AWG', qty: 100, unit: 'FT' }
  ]});
  var j2 = makeJob({ addressId: sharedAddrId, date: sharedDate, materials: [
    { materialId: uid(), itemId: itemA, name: 'Wire 12AWG', qty: 50, unit: 'FT' },
    { materialId: uid(), itemId: 'unique-item-' + uid(), name: 'Unique Item', qty: 1, unit: 'EA' }
  ]});
  var j3 = makeJob({ addressId: sharedAddrId, date: '2000-01-01', materials: [
    { materialId: uid(), itemId: itemA, name: 'Wire 12AWG', qty: 10, unit: 'FT' }
  ]});
  var j4 = makeJob({ addressId: PREFIX + 'other-addr-' + uid(), date: sharedDate, materials: [
    { materialId: uid(), itemId: itemA, name: 'Wire 12AWG', qty: 10, unit: 'FT' }
  ]});
  var j5 = makeJob({ addressId: sharedAddrId, date: sharedDate, materials: [
    { materialId: uid(), itemId: 'name-match-a-' + uid(), name: nameMatch, qty: 5, unit: 'EA' }
  ]});
  var j6 = makeJob({ addressId: sharedAddrId, date: sharedDate, materials: [
    { materialId: uid(), itemId: 'name-match-b-' + uid(), name: nameMatch.toLowerCase(), qty: 3, unit: 'EA' }
  ]});
  var j7 = makeJob({ addressId: sharedAddrId, date: sharedDate, materials: [
    { materialId: uid(), itemId: itemA, name: 'Wire 12AWG', qty: 10, unit: 'FT', deduplicated: true }
  ]});
  var j8 = makeJob({ addressId: sharedAddrId, date: sharedDate, materials: [] });
  var j9 = makeJob({ addressId: '', materials: [{ materialId: uid(), itemId: itemA, name: 'X', qty: 1, unit: 'EA' }] });

  [j1, j2, j3, j4, j5, j6, j7, j8, j9].forEach(function(j) { _A.addJob(j); });
  await sleep(500); // Single sleep for IDB to drain

  // Overlapping itemId detected
  var overlaps = detectMaterialOverlap(j1.id);
  addResult('Overlapping itemId detected', overlaps.length >= 1, 'overlaps: ' + overlaps.length);

  // Non-overlapping items NOT flagged
  var hasUnique = overlaps.some(function(o) { return o.sibMaterial.name === 'Unique Item'; });
  addResult('Non-overlapping items NOT flagged', !hasUnique);

  // Different day → no overlap
  var diffDay = detectMaterialOverlap(j3.id);
  addResult('Different day: no overlap', diffDay.length === 0, 'overlaps: ' + diffDay.length);

  // Different address → no overlap
  var diffAddr = detectMaterialOverlap(j4.id);
  addResult('Different address: no overlap', diffAddr.length === 0);

  // Name-based match (different itemId, same name case-insensitive)
  var nameOverlaps = detectMaterialOverlap(j5.id);
  var hasNameMatch = nameOverlaps.some(function(o) { return o.matchType === 'name'; });
  addResult('Name-based match (case-insensitive)', hasNameMatch, 'overlaps: ' + nameOverlaps.length);

  // Materials with deduplicated: true → skipped
  var dedupSkip = detectMaterialOverlap(j7.id);
  addResult('deduplicated:true skipped', dedupSkip.length === 0, 'overlaps: ' + dedupSkip.length);

  // Empty materials array → no crash, returns []
  var emptyMats = detectMaterialOverlap(j8.id);
  addResult('Empty materials: no crash, returns []', Array.isArray(emptyMats) && emptyMats.length === 0);

  // Empty/missing addressId → no crash, returns []
  var noAddr = detectMaterialOverlap(j9.id);
  addResult('Empty addressId: no crash, returns []', Array.isArray(noAddr) && noAddr.length === 0);

  // Nonexistent jobId → no crash, returns []
  var noJob = detectMaterialOverlap('nonexistent-' + uid());
  addResult('Nonexistent jobId: no crash, returns []', Array.isArray(noJob) && noJob.length === 0);
}

// ══════════════════════════════════════════
// 3. ADDRESS DEDUP
// ══════════════════════════════════════════

async function testAddressDedup() {
  suite('3. ADDRESS DEDUP');

  // haversineDistance: same point = 0
  var d0 = haversineDistance(29.7604, -95.3698, 29.7604, -95.3698);
  addResult('haversine: same point = 0', d0 === 0, 'd=' + d0);

  // 1° latitude ≈ 111km
  var d1 = haversineDistance(29.0, -95.0, 30.0, -95.0);
  addResult('haversine: 1° lat ≈ 111km', d1 > 110000 && d1 < 112000, 'd=' + Math.round(d1) + 'm');

  // Two points ~20m apart < 50
  var d2 = haversineDistance(29.760400, -95.369800, 29.760580, -95.369800);
  addResult('haversine: ~20m apart < 50m', d2 < 50, 'd=' + Math.round(d2) + 'm');

  // (0,0) coordinates work (BUG-043 regression)
  var d3 = haversineDistance(0, 0, 0, 0);
  addResult('haversine: (0,0) works (BUG-043)', d3 === 0, 'd=' + d3);

  var d4 = haversineDistance(0, 0, 0, 1);
  addResult('haversine: (0,0) to (0,1) > 0', d4 > 100000, 'd=' + Math.round(d4) + 'm');

  // normalizeAddress tests
  addResult('normalize: St → street', normalizeAddress('123 Main St') === '123 main street');
  addResult('normalize: Ave → avenue', normalizeAddress('456 Oak Ave') === '456 oak avenue');
  addResult('normalize: Dr → drive', normalizeAddress('789 Elm Dr') === '789 elm drive');
  addResult('normalize: N → north', normalizeAddress('100 N Main St') === '100 north main street');
  addResult('normalize: removes periods', normalizeAddress('123 Main St.') === '123 main street');
  addResult('normalize: collapses whitespace', normalizeAddress('123   Main   St') === '123 main street');
  addResult('normalize: empty string → ""', normalizeAddress('') === '');
  addResult('normalize: null → ""', normalizeAddress(null) === '');

  // findNearDupeAddresses: proximity match
  var allAddrs = [
    { id: 'a1', address: 'Addr A', lat: 29.7604, lng: -95.3698 },
    { id: 'a2', address: 'Addr B', lat: 29.76042, lng: -95.36982 },  // ~2m away
    { id: 'a3', address: 'Addr C', lat: 30.0, lng: -96.0, dupResolved: true }
  ];
  var newAddr = { id: 'new', address: 'New Addr', lat: 29.7604, lng: -95.3698 };
  var dupes = findNearDupeAddresses(newAddr, allAddrs);
  var hasProx = dupes.some(function(d) { return d.reason === 'proximity' && d.address.id === 'a1'; });
  addResult('findNearDupe: proximity match', hasProx, 'dupes: ' + dupes.length);

  // Self not flagged
  var selfAddr = { id: 'a1', address: 'Addr A', lat: 29.7604, lng: -95.3698 };
  var selfDupes = findNearDupeAddresses(selfAddr, allAddrs);
  var hasSelf = selfDupes.some(function(d) { return d.address.id === 'a1'; });
  addResult('findNearDupe: self not flagged', !hasSelf);

  // dupResolved addresses skipped
  var hasResolved = dupes.some(function(d) { return d.address.id === 'a3'; });
  addResult('findNearDupe: dupResolved skipped', !hasResolved);

  // Normalized string match (St vs Street)
  var normAddrs = [
    { id: 'n1', address: '100 Main Street, Houston TX' },
    { id: 'n2', address: '200 Oak Ave' }
  ];
  var normNew = { id: 'nn', address: '100 Main St, Houston TX' };
  var normDupes = findNearDupeAddresses(normNew, normAddrs);
  var hasNorm = normDupes.some(function(d) { return d.reason === 'normalized_match' && d.address.id === 'n1'; });
  addResult('findNearDupe: normalized match (St vs Street)', hasNorm, 'dupes: ' + normDupes.length);
}

// ══════════════════════════════════════════
// 4. INTELLIGENCE ENGINE EDGE CASES
// ══════════════════════════════════════════

async function testIntelligence() {
  suite('4. INTELLIGENCE ENGINE');

  var testType = PREFIX + 'Panel Swap ' + uid();
  // Create 6 jobs of unique test type with materials
  for (var i = 0; i < 6; i++) {
    var j = makeJob({
      types: [testType],
      materials: [
        { materialId: uid(), itemId: 'intel-item-' + i, name: 'Intel Mat ' + i, qty: i + 1, unit: 'EA' },
        { materialId: uid(), itemId: 'intel-zero', name: 'Zero Qty Mat', qty: 0, unit: 'EA' }
      ]
    });
    _A.addJob(j);
  }
  await sleep(800);

  // Invalidate cache
  try {
    _A.invalidateIntelCache();
    addResult('invalidateIntelCache: no crash', true);
  } catch (e) {
    addResult('invalidateIntelCache: no crash', false, e.message);
  }

  // Verify seed intelligence loaded (may be null if no historical import done)
  var seed = _A.getSeedIntelligence();
  if (seed === null) {
    addResult('getSeedIntelligence: null (no import)', 'skip', 'no historical data imported');
  } else {
    addResult('getSeedIntelligence: not null', true, typeof seed);
  }

  // Verify seed has expected types
  if (seed && typeof seed === 'object') {
    var seedTypes = Object.keys(seed);
    var hasPanel = seedTypes.some(function(t) { return t.toLowerCase().indexOf('panel') >= 0; });
    var hasService = seedTypes.some(function(t) { return t.toLowerCase().indexOf('service') >= 0; });
    var hasOutlet = seedTypes.some(function(t) { return t.toLowerCase().indexOf('outlet') >= 0; });
    addResult('Seed has Panel type', hasPanel, 'types: ' + seedTypes.slice(0, 5).join(', '));
    addResult('Seed has Service type', hasService);
    addResult('Seed has Outlet type', hasOutlet);
  } else {
    addResult('Seed has Panel type', 'skip', 'no seed data');
    addResult('Seed has Service type', 'skip', 'no seed data');
    addResult('Seed has Outlet type', 'skip', 'no seed data');
  }

  // Cache invalidation doesn't crash (double call)
  try {
    _A.invalidateIntelCache();
    _A.invalidateIntelCache();

    addResult('goTo screen-detail null: no crash', true);

  }

  // 20 rapid screen changes → no crash
  var screens = ['screen-jobs', 'screen-settings', 'screen-search', 'screen-addresses',

    'screen-estimates', 'screen-settings', 'screen-jobs', 'screen-search',
    'screen-addresses', 'screen-archive', 'screen-jobs', 'screen-dashboard',
    'screen-materials', 'screen-estimates', 'screen-jobs', 'screen-settings'];
  try {
    for (var i = 0; i < screens.length; i++) {

    }

// ══════════════════════════════════════════
// CLEANUP
// ══════════════════════════════════════════

async function cleanup() {
  suite('CLEANUP');

  // Remove BREAK- prefixed jobs
  var allJobs = _A.loadJobs();
  var toRemove = allJobs.filter(function(j) { return j.address && j.address.indexOf(PREFIX) === 0; });
  for (var i = 0; i < toRemove.length; i++) {
    if (_A.removeLocalJob) {
      _A.removeLocalJob(toRemove[i].id);
    } else {
      var idx = allJobs.indexOf(toRemove[i]);
      if (idx >= 0) allJobs.splice(idx, 1);
    }
  }

  // Remove BREAK- prefixed estimates
  var allEsts = _A.loadEstimates();
  for (var j = allEsts.length - 1; j >= 0; j--) {
    if (allEsts[j].address && allEsts[j].address.indexOf(PREFIX) === 0) {
      _A.deleteEstimate(allEsts[j].id);
    }
  }

  // Remove BREAK- prefixed addresses
  var allAddrs = _A.loadAddresses();
  for (var a = allAddrs.length - 1; a >= 0; a--) {
    if (allAddrs[a].address && allAddrs[a].address.indexOf(PREFIX) === 0) {
      if (_A.removeLocalAddress) {
        _A.removeLocalAddress(allAddrs[a].id);
      } else {
        allAddrs.splice(a, 1);
      }
    }
  }

  // Clear notifications
  _clearNotifs();

  // Clean up media blobs
  if (_A.deleteMediaBlob) {
    try {
      var blobs = await _A.getAllMediaBlobs();
      if (blobs) {
        for (var b = 0; b < blobs.length; b++) {
          if (blobs[b].id && blobs[b].id.indexOf(PREFIX) === 0) {
            await _A.deleteMediaBlob(blobs[b].id);
          }
        }
      }
    } catch(e) { /* non-critical */ }
  }

  addResult('BREAK- test data cleaned', true, toRemove.length + ' jobs removed');
}

// ══════════════════════════════════════════
// RUNNER
// ══════════════════════════════════════════

async function runAll() {
  var btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner">&#9881;</span> BREAKING THINGS...';
  _tests = []; _passed = 0; _failed = 0; _skipped = 0;
  document.getElementById('results').innerHTML = '';
  document.getElementById('summary').innerHTML = '';

  var start = Date.now();

  try {
    await loadAstra();
  } catch (e) {
    addResult('FATAL: ASTRA LOAD', false, e.message);
    btn.innerHTML = 'LOAD FAILED';
    btn.style.background = '#c0392b';
    btn.disabled = false;
    return;
  }

  var suites = [
    testRBAC, testMaterialDedup, testAddressDedup, testIntelligence,
    testRecalcAdversarial, testHistoricalImport, testNotifications,
    testCacheStress, testUtilities, testEstimateCRUD,
    testSearchAdversarial, testMediaLimits, testNavigation
  ];
  for (var si = 0; si < suites.length; si++) {
    try { await suites[si](); } catch (e) {
      addResult('SUITE CRASH: ' + (suites[si].name || si), false,
        e.message + ' | ' + (e.stack || '').split('\n').slice(0, 2).join(' '));
    }
  }

  try { await cleanup(); } catch (e) {
    addResult('CLEANUP ERROR', false, e.message);
  }

  var elapsed = ((Date.now() - start) / 1000).toFixed(1);
  if (_failed === 0) {
    btn.innerHTML = 'UNBREAKABLE';
    btn.style.background = '#2d8a4e';
  } else {
    btn.innerHTML = _failed + ' BROKEN';
    btn.style.background = '#c0392b';
  }
  btn.disabled = false;
  btn.style.color = '#fff';

  // Update summary with elapsed time
  var summaryEl = document.getElementById('summary');
  if (summaryEl.innerHTML) {
    summaryEl.innerHTML = summaryEl.innerHTML.replace('</div></div>',
      '<div class="summary-row"><span class="summary-label">TIME</span><span class="summary-value" style="color:#888;">' + elapsed + 's</span></div></div></div>');
  }
}
